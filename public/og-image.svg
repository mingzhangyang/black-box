<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b"/>
  <!-- Subtle dot grid -->
  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.08)"/>
    </pattern>
    <!-- Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#3f3f46" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="315" rx="380" ry="280" fill="url(#glow)"/>

  <!-- Box icon centered, scaled up -->
  <!-- Original 24x24 paths scaled by 8 (192x192), centered at 600,315 → offset by -96,-96 → translate(504,219) -->
  <g transform="translate(504,219) scale(8)" stroke="#a1a1aa" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
    <path d="m3.3 7 8.7 5 8.7-5"/>
    <path d="M12 22V12"/>
  </g>

  <!-- App name -->
  <text x="600" y="480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#f4f4f5" text-anchor="middle" letter-spacing="-1">The Black Box</text>
  <!-- Tagline -->
  <text x="600" y="538" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" fill="#71717a" text-anchor="middle">Drop your thoughts inside. You never know what will come out.</text>
</svg>
